metrics:
  counters:
    - name: oom_kills_total
      help: Count global and cgroup level OOMs with pod/namespace labels
      perf_event_array: true
      labels:
        - name: namespace
          size: 8
          reuse: true
          decoders:
            - name: uint
            - name: kube_namespace_from_cgroupid
        - name: pod
          size: 8
          reuse: true
          decoders:
            - name: uint
            - name: kube_pod_name_from_cgroupid
        - name: uid
          size: 8
          reuse: true
          decoders:
            - name: uint
            - name: kube_pod_uid_from_cgroupid
